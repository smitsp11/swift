name: SYNAPSE
options:
  bundleIdPrefix: com.synapse
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: SYNAPSE/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.synapse.neuralplayground
targets:
  SYNAPSE:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        INFOPLIST_FILE: SYNAPSE/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.synapse.neuralplayground
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_USER_SCRIPT_SANDBOXING: true
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    info:
      path: SYNAPSE/Info.plist
      properties:
        NSCameraUsageDescription: "SYNAPSE uses your camera to track hand movements and visualize neural signals in real time."
        UILaunchScreen:
          UIColorName: systemBackgroundColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
